#!/usr/sbin/nft -f

flush ruleset

table inet filter {
    # Indirizzi IP bloccati di esempio (utile per i test di drop)
    set blocked_ips {
        type ipv4_addr
        elements = { 10.99.99.99,172.18.0.4 }
    }

    chain input {
        type filter hook input priority 0; policy accept;

        # Accetta il traffico locale
        iif "lo" accept

        # Drop delle richieste provenienti dagli IP bloccati verso la porta di Envoy
        ip saddr @blocked_ips tcp dport 8443 log prefix "fw-drop: " group 100 reject

        # Accetta e logga le nuove connessioni per la porta 8443 (Envoy)        
        tcp dport 8443 ct state new log prefix "fw-accept: " group 100 accept     
    }

    chain forward {
        type filter hook forward priority 0; policy accept;
    }

    chain output {
        type filter hook output priority 0; policy accept;
    }
}
