# =============================================================================
# ulogd Configuration - ZTALeaks nftables Firewall
#
# ulogd reads packets logged by the nftables NFLOG target (group 100) and
# writes them as syslog-style text lines (LOGEMU format) to a file.
# The Go parser (nftables-parser) then converts those lines to JSONL.
#
# Plugin pipeline:
#   NFLOG  -> BASE -> IFINDEX -> IP2STR -> PRINTPKT -> LOGEMU
# =============================================================================

[global]
logfile  = /var/log/firewall/ulogd.log
loglevel = 1

# Load required plugins
plugin = "ulogd_inppkt_NFLOG.so"
plugin = "ulogd_filter_IFINDEX.so"
plugin = "ulogd_filter_IP2STR.so"
plugin = "ulogd_filter_PRINTPKT.so"
plugin = "ulogd_output_LOGEMU.so"
plugin = "ulogd_raw2packet_BASE.so"

# Processing stack: NFLOG input -> packet decoding -> IP string conversion
# -> human-readable formatting -> syslogemu file output
stack = log1:NFLOG,base1:BASE,ifi1:IFINDEX,ip2str1:IP2STR,print1:PRINTPKT,emu1:LOGEMU

# NFLOG group that matches the "group 100" parameter in nftables rules
[log1]
group = 100

# LOGEMU output: write syslog-style lines to the target file.
# sync=1 flushes after every write to minimise data loss on crash.
[emu1]
file = "/var/log/firewall/ulogd-syslogemu.log"
sync = 1