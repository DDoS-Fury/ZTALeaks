<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Operativa - ZTALeaks</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        /* Solo piccoli adattamenti locali; il grosso e' in styles.css */
        .content-header { align-items: flex-start; }
        .header-actions { gap: 0.5rem; }
        .view { display: none; }
        .view.active { display: block; }
        .btn[disabled] { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>ZTALeaks</h1>
                <p>Dashboard Operativa ZTA</p>
            </div>
            <ul class="nav-list" id="nav-list">
                <li><a href="/" class="nav-link">Home</a></li>
                <!-- Voci risorse generate dinamicamente in base al ruolo -->
            </ul>
        </nav>

        <main class="content">
            <header class="content-header">
                <div>
                    <h2 id="view-title">Dashboard</h2>
                    <p class="identity" id="identity">Decodifica token in corso...</p>
                </div>
                <div class="header-actions">
                    <button class="btn btn-green" id="enroll-tpm-btn">Registra Security Key</button>
                    <button class="btn btn-logout" id="logout-btn">Logout</button>
                </div>
            </header>

            <div id="views"><!-- Viste generate dinamicamente --></div>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
    <script>


        // === Configurazione risorse ==============================================
        // Solo rotte realmente implementate nel backend. Le capacita' (GET/POST/
        // DELETE) vengono filtrate per ruolo tramite il mirror RBAC (ZTA.roleCan).
        // columns/fields/idField rispecchiano i json tag dei modelli Go
        // (services/business-logic/internal/models/types.go).
        const CLASSIFICATIONS = ['PUBLIC', 'INTERNAL', 'CONFIDENTIAL', 'SECRET', 'TOP_SECRET'];
        const RESOURCES = [
            {
                key: 'personnel', label: 'Personnel', path: '/api/v1/personnel',
                idField: 'employee_id',
                columns: ['employee_id', 'first_name', 'last_name', 'role', 'department', 'clearance_level', 'status'],
                fields: [
                    { name: 'employee_id', label: 'Employee ID', placeholder: 'NP-2023-0001' },
                    { name: 'badge_id', label: 'Badge ID', placeholder: 'BDG-12345' },
                    { name: 'first_name', label: 'Nome', placeholder: 'Mario' },
                    { name: 'last_name', label: 'Cognome', placeholder: 'Rossi' },
                    { name: 'role', label: 'Ruolo', type: 'select', options: ['operator', 'manager', 'admin'] },
                    { name: 'department', label: 'Dipartimento', placeholder: 'OPS' },
                    { name: 'clearance_level', label: 'Clearance', type: 'select', options: CLASSIFICATIONS },
                    { name: 'classification_level', label: 'Classificazione record', type: 'select', options: CLASSIFICATIONS },
                    { name: 'status', label: 'Stato', type: 'select', options: ['active', 'inactive'] },
                    { name: 'contact.email', label: 'Email', placeholder: 'mario.rossi@ztaleaks.local' },
                ],
                hasDelete: false,
                trustedGuard: true, // POST sanitized-delete (admin, annotato)
            },
            {
                key: 'reactor', label: 'Reactor Parameters', path: '/api/v1/reactor-parameters',
                idField: 'reactor_id',
                columns: ['reactor_id', 'thermal_power_mw', 'electrical_power_mw', 'coolant_pressure_mpa', 'reactor_status', 'timestamp'],
                fields: [
                    { name: 'reactor_id', label: 'Reactor ID', placeholder: 'RX-1' },
                    { name: 'thermal_power_mw', label: 'Potenza termica (MW)', type: 'number', placeholder: '3000' },
                    { name: 'electrical_power_mw', label: 'Potenza elettrica (MW)', type: 'number', placeholder: '1000' },
                    { name: 'coolant_pressure_mpa', label: 'Pressione refrigerante (MPa)', type: 'number', placeholder: '15.5' },
                    { name: 'reactor_status', label: 'Stato reattore', type: 'select', options: ['operational', 'shutdown', 'maintenance', 'scram'] },
                    { name: 'classification_level', label: 'Classificazione', type: 'select', options: CLASSIFICATIONS },
                    { name: 'recorded_by', label: 'Registrato da', placeholder: 'EMP-100' },
                ],
                hasDelete: true,
            },
            {
                key: 'documents', label: 'Documents', path: '/api/v1/documents',
                idField: 'document_id',
                columns: ['document_id', 'title', 'type', 'category', 'classification_level', 'status'],
                fields: [
                    { name: 'document_id', label: 'Document ID', placeholder: 'DOC-100' },
                    { name: 'title', label: 'Titolo', placeholder: 'Procedura Operativa' },
                    { name: 'type', label: 'Tipo', type: 'select', options: ['procedure', 'manual', 'drawing', 'report', 'analysis'] },
                    { name: 'category', label: 'Categoria', placeholder: 'operations' },
                    { name: 'classification_level', label: 'Classificazione', type: 'select', options: CLASSIFICATIONS },
                    { name: 'status', label: 'Stato', type: 'select', options: ['active', 'archived', 'draft'] },
                ],
                hasDelete: true,
            },
            {
                key: 'materials', label: 'Nuclear Materials', path: '/api/v1/nuclear-materials',
                idField: 'material_id',
                columns: ['material_id', 'type', 'description', 'mass_kg', 'classification_level', 'status'],
                fields: [
                    { name: 'material_id', label: 'Material ID', placeholder: 'NM-100' },
                    { name: 'type', label: 'Tipo', type: 'select', options: ['fuel_assembly', 'spent_fuel', 'waste', 'source'] },
                    { name: 'description', label: 'Descrizione', placeholder: 'Elemento di combustibile' },
                    { name: 'mass_kg', label: 'Massa (kg)', type: 'number', placeholder: '1.5' },
                    { name: 'classification_level', label: 'Classificazione', type: 'select', options: CLASSIFICATIONS },
                    { name: 'status', label: 'Stato', type: 'select', options: ['stored', 'in_use', 'depleted'] },
                    { name: 'location.zone_id', label: 'Zona di stoccaggio', placeholder: 'ZONE-SF-01' },
                ],
                hasDelete: true,
            },
        ];

        const TRUSTED_GUARD_PATH = '/api/v1/trusted-guard/sanitized-delete-personnel';

        // === Costruzione UI in base al ruolo =====================================
        function buildDashboard(role) {
            const navList = document.getElementById('nav-list');
            const viewsEl = document.getElementById('views');
            let firstKey = null;

            RESOURCES.forEach(res => {
                // Voce di navigazione solo se il ruolo puo' almeno leggere la risorsa.
                if (!ZTA.roleCan(role, res.path, 'GET')) return;
                if (!firstKey) firstKey = res.key;

                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.className = 'nav-link';
                a.textContent = res.label;
                a.dataset.view = res.key;
                a.addEventListener('click', (e) => { e.preventDefault(); showView(res.key); });
                li.appendChild(a);
                navList.appendChild(li);

                viewsEl.appendChild(buildView(res, role));
            });

            if (firstKey) {
                showView(firstKey);
            } else {
                viewsEl.innerHTML = '<div class="landing-card"><h2>Nessuna risorsa</h2>' +
                    '<p>Il tuo ruolo non ha accesso in lettura a nessuna risorsa operativa esposta.</p></div>';
                document.getElementById('view-title').textContent = 'Dashboard';
            }
        }

        function buildView(res, role) {
            const section = document.createElement('section');
            section.className = 'view';
            section.dataset.view = res.key;

            // --- Barra azioni (gated per ruolo) ---
            const bar = document.createElement('div');
            bar.className = 'action-bar';

            const refresh = mkBtn('Aggiorna Dati', 'btn btn-primary');
            refresh.addEventListener('click', () => loadList(res));
            bar.appendChild(refresh);

            const canCreate = ZTA.roleCan(role, res.path, 'POST');
            if (canCreate) {
                const createToggle = mkBtn('Nuovo (POST)', 'btn btn-green');
                createToggle.addEventListener('click', () => {
                    section.querySelector('.resource-form').classList.toggle('open');
                });
                bar.appendChild(createToggle);
            }
            section.appendChild(bar);

            // --- Form di creazione (campi strutturati) ---
            if (canCreate) {
                const form = document.createElement('div');
                form.className = 'resource-form';
                const grid = document.createElement('div');
                grid.className = 'form-grid';
                res.fields.forEach(f => {
                    const wrap = document.createElement('div');
                    wrap.className = 'form-field';
                    const lbl = document.createElement('label');
                    lbl.textContent = f.label;
                    wrap.appendChild(lbl);
                    let input;
                    if (f.type === 'select') {
                        input = document.createElement('select');
                        f.options.forEach(o => {
                            const opt = document.createElement('option');
                            opt.value = o; opt.textContent = o;
                            input.appendChild(opt);
                        });
                    } else {
                        input = document.createElement('input');
                        input.type = f.type === 'number' ? 'number' : 'text';
                        if (f.type === 'number') input.step = 'any';
                        if (f.placeholder) input.placeholder = f.placeholder;
                    }
                    input.dataset.field = f.name;
                    input.dataset.kind = f.type || 'text';
                    wrap.appendChild(input);
                    grid.appendChild(wrap);
                });
                form.appendChild(grid);
                const sendBtn = mkBtn('Crea record (POST)', 'btn btn-green');
                sendBtn.style.marginTop = '0.75rem';
                sendBtn.addEventListener('click', () => doCreate(res, collectForm(form)));
                form.appendChild(sendBtn);
                section.appendChild(form);
            }

            // --- DELETE per id (gated) ---
            if (res.hasDelete && ZTA.roleCan(role, res.path, 'DELETE')) {
                const del = document.createElement('div');
                del.className = 'action-bar';
                const idInput = mkInput(res.idField + ' da eliminare');
                const delBtn = mkBtn('Elimina (DELETE)', 'btn btn-red');
                delBtn.addEventListener('click', () => {
                    const id = idInput.value.trim();
                    if (!id) { renderResultText(res, 'Inserisci il campo ' + res.idField + ' del record da eliminare.', true); return; }
                    doDelete(res, id);
                });
                del.appendChild(idInput);
                del.appendChild(delBtn);
                section.appendChild(del);
            }

            // --- Trusted-Guard sanitized-delete (admin, annotato) ---
            if (res.trustedGuard && ZTA.roleCan(role, TRUSTED_GUARD_PATH, 'POST')) {
                const tg = document.createElement('div');
                tg.className = 'action-bar';
                const idInput = mkInput('employee_id (sanitized-delete)');
                const tgBtn = mkBtn('Trusted-Guard Delete', 'btn btn-red');
                tgBtn.innerHTML += '<span class="badge-locked">solo admin</span>';
                tgBtn.addEventListener('click', () => {
                    const id = idInput.value.trim();
                    if (!id) { renderResultText(res, 'Inserisci l\'employee_id del personale da eliminare.', true); return; }
                    doTrustedGuard(res, id);
                });
                tg.appendChild(idInput);
                tg.appendChild(tgBtn);
                section.appendChild(tg);
                const note = document.createElement('p');
                note.className = 'action-note';
                note.textContent = 'Nota: la rotta trusted-guard richiede ruolo admin e certificato mTLS. ' +
                    'La cancellazione e\' asincrona e tracciata; l\'esito reale e\' mostrato qui sotto.';
                section.appendChild(note);
            }

            // --- Tabella dati ---
            const tableWrap = document.createElement('div');
            tableWrap.className = 'table-wrapper';
            tableWrap.style.display = 'none';
            tableWrap.innerHTML = '<table><thead></thead><tbody></tbody></table>';
            section.appendChild(tableWrap);

            // --- Pannello esito (console policy) ---
            const result = document.createElement('div');
            result.className = 'result-panel';
            result.textContent = 'Seleziona "Aggiorna Dati" per interrogare la rotta protetta...';
            section.appendChild(result);

            return section;
        }

        // === Navigazione tra viste ===============================================
        function showView(key) {
            document.querySelectorAll('.view').forEach(v => v.classList.toggle('active', v.dataset.view === key));
            document.querySelectorAll('#nav-list .nav-link').forEach(a =>
                a.classList.toggle('active', a.dataset.view === key));
            const res = RESOURCES.find(r => r.key === key);
            document.getElementById('view-title').textContent = res ? res.label : 'Dashboard';
            if (res) loadList(res);
        }

        // === Operazioni API ======================================================
        async function loadList(res) {
            renderResultText(res, 'GET ' + res.path + ' ...');
            try {
                const r = await ZTA.apiFetch('GET', res.path);
                renderResponse(res, 'GET', res.path, r);
                if (r.ok) renderTable(res, r.text);
                else hideTable(res);
            } catch (e) {
                renderResultText(res, 'Errore di rete: ' + e.message, true);
            }
        }

        // Raccoglie i campi del form in un oggetto; supporta un livello di
        // nesting con la dot-notation (es. "contact.email", "location.zone_id").
        function collectForm(form) {
            const body = {};
            form.querySelectorAll('[data-field]').forEach(input => {
                const raw = input.value.trim();
                if (!raw) return; // campi vuoti omessi
                const value = input.dataset.kind === 'number' ? Number(raw) : raw;
                const parts = input.dataset.field.split('.');
                if (parts.length === 2) {
                    body[parts[0]] = body[parts[0]] || {};
                    body[parts[0]][parts[1]] = value;
                } else {
                    body[parts[0]] = value;
                }
            });
            return body;
        }

        async function doCreate(res, body) {
            if (!Object.keys(body).length) {
                renderResultText(res, 'Compila almeno un campo prima di inviare.', true);
                return;
            }
            renderResultText(res, 'POST ' + res.path + ' ...');
            try {
                const r = await ZTA.apiFetch('POST', res.path, body);
                renderResponse(res, 'POST', res.path, r);
                if (r.ok) loadList(res);
            } catch (e) {
                renderResultText(res, 'Errore di rete: ' + e.message, true);
            }
        }

        async function doDelete(res, id) {
            const path = res.path + '/' + encodeURIComponent(id);
            renderResultText(res, 'DELETE ' + path + ' ...');
            try {
                const r = await ZTA.apiFetch('DELETE', path);
                renderResponse(res, 'DELETE', path, r);
                if (r.ok) loadList(res);
            } catch (e) {
                renderResultText(res, 'Errore di rete: ' + e.message, true);
            }
        }

        async function doTrustedGuard(res, id) {
            const path = TRUSTED_GUARD_PATH + '/' + encodeURIComponent(id);
            renderResultText(res, 'POST ' + path + ' ...');
            try {
                const r = await ZTA.apiFetch('POST', path);
                renderResponse(res, 'POST', path, r);
            } catch (e) {
                renderResultText(res, 'Errore di rete: ' + e.message, true);
            }
        }

        // === Rendering ===========================================================
        function viewEl(res) { return document.querySelector('.view[data-view="' + res.key + '"]'); }

        function renderResponse(res, method, path, r) {
            const el = viewEl(res).querySelector('.result-panel');
            el.classList.toggle('error', !r.ok);
            el.textContent = '';

            const summary = document.createElement('p');
            summary.className = 'result-summary';
            if (r.ok) {
                if (r.status === 202) {
                    summary.textContent = 'Richiesta accettata: eliminazione sanitizzata pianificata in modo asincrono.';
                } else if (method === 'GET') {
                    summary.textContent = 'Dati aggiornati (' + r.status + ' ' + r.statusText + ').';
                } else if (method === 'POST') {
                    summary.textContent = 'Record creato (' + r.status + ' ' + r.statusText + ').';
                } else {
                    summary.textContent = 'Operazione completata (' + r.status + ' ' + r.statusText + ').';
                }
            } else {
                summary.textContent = ZTA.friendlyError(r.status);
                const img = document.createElement('img');
                img.src = '/static/images/helo.gif';
                img.style.display = 'block';
                img.style.marginTop = '10px';
                img.style.maxWidth = '100%';
                summary.appendChild(img);
            }
            el.appendChild(summary);

            // Dettaglio tecnico sempre consultabile, ma collassato.
            const details = document.createElement('details');
            details.className = 'raw-response';
            const sum = document.createElement('summary');
            sum.textContent = 'Dettaglio risposta (' + method + ' ' + path + ' -> ' + r.status + ')';
            details.appendChild(sum);
            const pre = document.createElement('pre');
            let body = r.text;
            try { body = JSON.stringify(JSON.parse(r.text), null, 2); } catch { /* testo non-JSON */ }
            pre.textContent = body || '(corpo vuoto)';
            details.appendChild(pre);
            el.appendChild(details);

            if (r.status === 401) handleExpired();
        }

        function renderResultText(res, text, isError) {
            const el = viewEl(res).querySelector('.result-panel');
            el.textContent = text;
            el.classList.toggle('error', !!isError);
            if (isError) {
                const img = document.createElement('img');
                img.src = '/static/images/helo.gif';
                img.style.display = 'block';
                img.style.marginTop = '10px';
                img.style.maxWidth = '100%';
                el.appendChild(img);
            }
        }

        function hideTable(res) {
            viewEl(res).querySelector('.table-wrapper').style.display = 'none';
        }

        function renderTable(res, text) {
            let data;
            try { data = JSON.parse(text); } catch { hideTable(res); return; }
            const rows = Array.isArray(data) ? data : (data && data.data ? data.data : (data ? [data] : []));
            const wrap = viewEl(res).querySelector('.table-wrapper');
            const thead = wrap.querySelector('thead');
            const tbody = wrap.querySelector('tbody');

            if (!rows.length) {
                thead.innerHTML = '';
                tbody.innerHTML = '<tr><td class="empty-hint">Nessun record restituito.</td></tr>';
                wrap.style.display = 'block';
                return;
            }

            // Colonne: quelle configurate presenti nei dati, altrimenti dedotte.
            let cols = res.columns.filter(c => rows.some(r => r[c] !== undefined));
            if (!cols.length) {
                cols = Object.keys(rows[0]).slice(0, 8);
            }

            thead.innerHTML = '<tr>' + cols.map(c => '<th>' + escapeHtml(c) + '</th>').join('') + '</tr>';
            tbody.innerHTML = rows.map(row =>
                '<tr>' + cols.map(c => '<td>' + formatCell(c, row[c]) + '</td>').join('') + '</tr>'
            ).join('');
            wrap.style.display = 'block';
        }

        function formatCell(col, val) {
            if (val === undefined || val === null) return 'N/A';
            if (col === 'status') {
                const s = String(val).toLowerCase();
                let cls = 'status-warning';
                if (['active', 'in_use', 'operational', 'stored'].includes(s)) cls = 'status-active';
                if (['inactive', 'depleted', 'storage', 'archived'].includes(s)) cls = 'status-inactive';
                return '<span class="status-badge ' + cls + '">' + escapeHtml(String(val)) + '</span>';
            }
            if (['id', 'employee_id', 'document_id', 'material_id', 'reactor_id'].includes(col)) {
                return '<span class="cell-id">' + escapeHtml(String(val)) + '</span>';
            }
            if (col === 'classification_level' || col === 'clearance_level') {
                return '<span class="cell-chip">' + escapeHtml(String(val)) + '</span>';
            }
            if (typeof val === 'object') return escapeHtml(JSON.stringify(val));
            return escapeHtml(String(val));
        }

        function handleExpired() {
            if (ZTA.isExpired()) {
                setTimeout(ZTA.logout, 1500);
            }
        }

        // === Utilita' DOM ========================================================
        function mkBtn(label, cls) { const b = document.createElement('button'); b.className = cls; b.textContent = label; return b; }
        function mkInput(ph) {
            const i = document.createElement('input');
            i.type = 'text'; i.placeholder = ph;
            i.style.cssText = 'padding:0.5rem;background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:4px;font-family:inherit;';
            return i;
        }
        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // =========================================================================
        // WEBAUTHN ENROLLMENT (richiede JWT + mTLS) - flusso invariato
        // =========================================================================
        function bufferToBase64url(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let charCode of bytes) str += String.fromCharCode(charCode);
            return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
        }
        // Base64 STANDARD (con padding): il backend decodifica la public key
        // con base64.StdEncoding (iam-service/internal/webauthn/register.go).
        function bufferToBase64Std(buffer) {
            const bytes = new Uint8Array(buffer);
            let str = '';
            for (let charCode of bytes) str += String.fromCharCode(charCode);
            return btoa(str);
        }
        // AAGUID = byte 37..52 dell'authenticatorData (dopo rpIdHash[32] + flags[1] + counter[4]).
        function extractAaguid(authData) {
            try {
                const b = new Uint8Array(authData).slice(37, 53);
                if (b.length !== 16) return '00000000-0000-0000-0000-000000000000';
                const hex = Array.from(b, x => x.toString(16).padStart(2, '0')).join('');
                return hex.slice(0,8) + '-' + hex.slice(8,12) + '-' + hex.slice(12,16) + '-' +
                       hex.slice(16,20) + '-' + hex.slice(20);
            } catch {
                return '00000000-0000-0000-0000-000000000000';
            }
        }
        function base64urlToBuffer(base64url) {
            const padding = '='.repeat((4 - base64url.length % 4) % 4);
            const base64 = (base64url + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) outputArray[i] = rawData.charCodeAt(i);
            return outputArray.buffer;
        }

        document.getElementById('enroll-tpm-btn').addEventListener('click', async () => {
            const jwt = ZTA.getToken();
            alert("Avvio cerimonia WebAuthn.\nSe ricevi 'policy denied' assicurati di avere il certificato mTLS attivo nel browser.");
            try {
                const rBegin = await fetch('/api/v1/auth/register/begin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
                    body: JSON.stringify({ device_name: "My Hardware Key" })
                });
                if (!rBegin.ok) { alert("Errore: " + await rBegin.text()); return; }

                const options = await rBegin.json();
                options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
                options.publicKey.user.id = base64urlToBuffer(options.publicKey.user.id);

                const credential = await navigator.credentials.create({ publicKey: options.publicKey });

                // Chiave pubblica reale dell'authenticator (DER/SPKI) e AAGUID
                // estratto dall'authenticatorData; niente piu' valori fittizi.
                const pubKeyBuf = credential.response.getPublicKey
                    ? credential.response.getPublicKey() : null;
                if (!pubKeyBuf) {
                    alert("Il browser non espone la chiave pubblica della credenziale (getPublicKey non supportato).");
                    return;
                }
                const authData = credential.response.getAuthenticatorData
                    ? credential.response.getAuthenticatorData() : null;

                const rFinish = await fetch('/api/v1/auth/register/finish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
                    body: JSON.stringify({
                        session_id: options.SessionID || options.session_id,
                        credential_id: credential.id,
                        public_key: bufferToBase64Std(pubKeyBuf),
                        attestation_type: credential.response.attestationObject ? "packed" : "none",
                        aaguid: authData ? extractAaguid(authData) : "00000000-0000-0000-0000-000000000000"
                    })
                });

                if (rFinish.ok) {
                    alert("Security Key registrata! Account ora Tier 2 (WebAuthn). Riesegui il login per aggiornare il token.");
                } else {
                    alert("Registrazione fallita:\n" + await rFinish.text());
                }
            } catch (err) {
                alert("Annullato o errore: " + err.message);
            }
        });

        // === Guardia di autenticazione ed Event Listeners globali =================
        const claims = ZTA.requireAuth();
        if (claims) {
            ZTA.renderIdentity(document.getElementById('identity'));
            buildDashboard(claims.role);
        }
        document.getElementById('logout-btn').addEventListener('click', ZTA.logout);
    </script>
</body>
