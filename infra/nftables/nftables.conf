#!/usr/sbin/nft -f
# =============================================================================
# nftables Firewall Ruleset - ZTALeaks
#
# Design principles:
#   - Default-deny on input and output (Zero Trust).
#   - IDS integration via NFQUEUE with "bypass" for fail-open behaviour:
#     if a Snort instance crashes, the kernel accepts the packet rather than
#     dropping it, keeping the system operational.
#   - Snort instances run as pure IDS (alert only, no drop verdicts).
#   - Placeholders ENV_ENVOY_PORT and ENV_FRONT_IFACE are substituted at
#     container startup by entrypoint.sh.
#
# NFQUEUE assignment:
#   Queue 1 - snort (external):  inbound traffic on the front-net interface
#   Queue 2 - snort-internal:    TCP traffic destined for the Envoy port
#   Queue 3 - snort-mid:         TCP traffic from Envoy to the orchestrator
#
# Note on Docker NAT compatibility:
#   Rules are loaded with "delete table + nft -f" rather than "flush ruleset"
#   to preserve Docker's internal NAT entries for the embedded DNS resolver
#   (127.0.0.11).
# =============================================================================

table inet filter {

    # =========================================================================
    # IDS chains (NFQUEUE hooks)
    #
    # These chains run at negative priorities so packets are inspected by
    # Snort BEFORE reaching the security chains (input/forward/output) which
    # have policy drop. The "bypass" keyword ensures fail-open behaviour:
    # if Snort crashes, the kernel accepts the packet instead of dropping it.
    # Snort always verdicts ACCEPT (pure IDS mode), so traffic flows normally
    # into the downstream policy chains.
    # =========================================================================

    # Queue 1 - external Snort: inspects all inbound traffic on the front-net
    # interface. Covers port scanning and reconnaissance activity.
    # The interface name (ENV_FRONT_IFACE) is resolved at runtime because
    # Docker assigns interface names alphabetically by network name.
    chain ids_prerouting {
        type filter hook prerouting priority -150; policy accept;

        iifname "ENV_FRONT_IFACE" queue num 1 bypass
    }

    # Queue 2 - snort-internal: inspects TCP traffic destined for the Envoy
    # port. Runs at priority -140, after queue 1 at -150. Because snort-external
    # verdicts ACCEPT, the packet continues and reaches this chain.
    # Covers TLS handshake anomalies: missing mTLS certificate, legacy TLS
    # versions, downgrade attacks, weak cipher suites, SYN flood.
    chain ids_prerouting_tls {
        type filter hook prerouting priority -140; policy accept;

        tcp dport ENV_ENVOY_PORT queue num 2 bypass
    }

    # Queue 3 - snort-mid: inspects TCP traffic from Envoy to the Security
    # Orchestrator on port 8081. Envoy shares the network namespace with this
    # firewall, so its outbound requests to the orchestrator traverse the OUTPUT
    # hook (not FORWARD, because the firewall namespace is not an IP router).
    # Covers SQL injection and XSS on the plaintext ext_authz URI.
    chain ids_output_extauthz {
        type filter hook output priority -150; policy accept;

        tcp dport 8081 queue num 3 bypass
    }

    # =========================================================================
    # Input chain - default DROP; only explicitly permitted traffic is accepted
    # =========================================================================
    chain input {
        type filter hook input priority 0; policy drop;

        # Always allow loopback traffic
        iif "lo" accept

        # Accept replies for already established or related connections
        ct state established,related accept


        # SYN flood mitigation: per-source token bucket (max 20 new SYNs/sec).
        # The meter maintains a separate bucket per source IP (dynamic set),
        # preventing a single attacker from exhausting a global quota and
        # denying service to legitimate clients.
        tcp flags & (fin|syn|rst|ack) == syn \
            meter syn_meter { ip saddr limit rate over 20/second } \
            log prefix "fw-syn-flood-drop: " group 100 drop

        # Accept new connections toward the Envoy listener
        tcp dport ENV_ENVOY_PORT ct state new \
            log prefix "fw-accept: " group 100 accept

        # Allow internal traffic between Envoy and the microservices
        # (PEP to application: orchestrator, identity, business-logic)
        tcp dport { 8080, 8081, 8082 } ct state new accept
    }

    # =========================================================================
    # Forward chain - DROP everything (no inter-interface routing in this setup)
    # =========================================================================
    chain forward {
        type filter hook forward priority 0; policy drop;
    }

    # =========================================================================
    # Output chain - default DROP; only strictly required egress is permitted
    #
    # Envoy shares this network namespace and communicates only with:
    #   - security-orchestrator :8081
    #   - identity-service      :8082
    #   - business-logic        :8080
    #   - internal Docker DNS   :53
    #   - Snort TCP socket to orchestrator :9000
    #   - MongoDB               :27017  (via orchestrator in the same ns)
    #   - ephemeral/syslog      :1025
    #
    # Ports 80, 443, 8088, 8181 belong to other containers in their own
    # namespaces and must not be permitted here (Zero Trust principle).
    # =========================================================================
    chain output {
        type filter hook output priority 0; policy drop;

        # Always allow loopback traffic
        oif "lo" accept

        # Accept replies for already established or related connections
        ct state established,related accept

        # Permitted egress ports (TCP and DNS/UDP)
        tcp dport { 53, 8080, 8081, 8082, 9000, 1025, 27017 } accept
        udp dport 53 accept

        # Log and drop everything else
        log prefix "fw-egress-drop: " group 100 drop
    }
}