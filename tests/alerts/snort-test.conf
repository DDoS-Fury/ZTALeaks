# Minimal Snort 2.9 config used by the offline-pcap test runner.
# The actual rule set is appended at runtime via `include $RULE_PATH`
# (the wrapper writes a one-line include and snort -c <conf>s it).

var HOME_NET any
var EXTERNAL_NET any
var RULE_PATH /rules

# Required preprocessor: stream5 enables `flow:established` matching.
preprocessor stream5_global: track_tcp yes, track_udp no, track_icmp no
preprocessor stream5_tcp: policy windows, timeout 30, ports both all

# Snort wants a classification.config / reference.config; the snort
# package ships them in /etc/snort/.
include /etc/snort/classification.config
include /etc/snort/reference.config

# Fast alert output (one alert per line in <logdir>/alert).
output alert_fast: stdout
