# =============================================================================
# MongoDB Configuration - Business Database
# Project: ZTALeaks - Zero Trust Architecture for Nuclear Plant
# =============================================================================
# This configuration enforces authentication, restricts network exposure,
# and enables operational profiling for audit purposes.
# =============================================================================

storage:
  dbPath: /data/db

systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  verbosity: 1

net:
  port: 27017
  bindIp: 0.0.0.0
  maxIncomingConnections: 100

security:
  authorization: enabled

operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 200