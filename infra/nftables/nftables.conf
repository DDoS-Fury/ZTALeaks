#!/usr/sbin/nft -f

table inet filter {
    # Indirizzi IP bloccati di esempio (utile per i test di drop)
    set blocked_ips {
        type ipv4_addr
        elements = { 10.99.99.99,172.18.0.10 }
    }

    # IDS inline (NFQUEUE) — agisce in PREROUTING/OUTPUT a priorita' negative,
    # cosi' i pacchetti vengono ispezionati dagli Snort PRIMA di colpire le
    # chain di sicurezza (input/forward/output con policy drop). Le rule
    # 'bypass' garantiscono fail-open: se uno snort crasha il kernel
    # accetta il pacchetto. Snort verdicta sempre ACCEPT (IDS puro, niente
    # drop), quindi il traffico fluisce normalmente verso le chain di policy.
    chain ids_prerouting {
        type filter hook prerouting priority -150; policy accept;

        # Snort esterno (queue 1): tutto il traffico in ingresso sul segmento
        # front-net (interfaccia risolta a runtime: docker assegna eth0/eth1/...
        # in ordine alfabetico delle reti, quindi front-net non e' sempre eth0).
        # Copre port scanning e ricognizione.
        iifname "ENV_FRONT_IFACE" queue num 1 bypass
    }

    chain ids_prerouting_tls {
        type filter hook prerouting priority -140; policy accept;

        # Snort-internal (queue 2): traffico TCP verso la porta Envoy.
        # Vede gli stessi pacchetti di queue 1 perche' la chain gira a una
        # priorita' successiva nello stesso hook (snort esterno verdicta
        # ACCEPT, il pacchetto continua e raggiunge questa chain).
        # Copre handshake TLS: mTLS empty cert, legacy versions, downgrade,
        # weak cipher, SYN flood volumetrico.
        tcp dport ENV_ENVOY_PORT queue num 2 bypass
    }

    chain ids_output_extauthz {
        type filter hook output priority -150; policy accept;

        # Snort-mid (queue 3): traffico ext_authz Envoy -> Security
        # Orchestrator. Envoy gira nello stesso netns del firewall e
        # genera la richiesta HTTP plaintext verso orchestrator:8081
        # come traffico LOCALE, quindi attraversa il hook OUTPUT
        # (non forward: il firewall netns non e' un router IP, e'
        # un endpoint). Copre SQLi/XSS su URI in chiaro.
        tcp dport 8081 queue num 3 bypass
    }

    chain input {
        # Default DROP: accettiamo solo cio' che e' esplicitamente permesso
        type filter hook input priority 0; policy drop;

        # Loopback sempre OK
        iif "lo" accept

        # Reply delle connessioni gia' stabilite
        ct state established,related accept

        # Deny-list IP: reject esplicito (con log) PRIMA del rate-limit,
        # cosi' un IP in blocked_ips non consuma quota del SYN meter.
        ip saddr @blocked_ips tcp dport ENV_ENVOY_PORT log prefix "fw-drop: " group 100 reject

        # SYN-flood mitigation per-source: ogni IP sorgente puo' aprire
        # al massimo 20 nuove connessioni/sec; quelle eccedenti vengono
        # droppate e loggate. Il meter mantiene un token bucket separato
        # per ogni saddr (dynamic set), evitando che un attaccante saturi
        # la quota globale bloccando i client legittimi.
        tcp flags & (fin|syn|rst|ack) == syn meter syn_meter { ip saddr limit rate over 20/second } log prefix "fw-syn-flood-drop: " group 100 drop

        # Nuove connessioni verso Envoy
        tcp dport ENV_ENVOY_PORT ct state new log prefix "fw-accept: " group 100 accept
    }

    chain forward {
        # Nessun routing tra interfacce in setup container
        type filter hook forward priority 0; policy drop;
    }

    chain output {
        type filter hook output priority 0; policy drop;

        # Loopback sempre OK
        oif "lo" accept

        # Reply delle connessioni esistenti
        ct state established,related accept

        # Allow-list ristretta: solo le porte che Envoy davvero apre in
        # uscita. Envoy condivide il network namespace con questo firewall
        # e parla solo con security-orchestrator (8081), identity-service
        # (8082), business-logic (8080) e il DNS interno Docker (53).
        # 9000 = socket TCP persistente snort -> security-orchestrator
        # (gli snort condividono questo netns col firewall).
        # 80/443/8088/8181 sono usate da altri container nei loro ns e
        # non vanno permesse qui (Zero Trust: only what is strictly used).
        tcp dport { 53, 8080, 8081, 8082, 9000 } accept
        udp dport 53 accept

        # Logga e droppa tutto il resto
        log prefix "fw-egress-drop: " group 100 drop
    }
}
