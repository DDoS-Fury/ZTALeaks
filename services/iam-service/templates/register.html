<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZTA Leaks - Registrazione</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --text: #f8fafc;
            --primary: #3b82f6; --primary-hover: #2563eb;
            --danger: #ef4444; --success: #10b981;
            --border: #334155; --muted: #94a3b8;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg); color: var(--text);
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .container {
            background-color: var(--panel); border: 1px solid var(--border);
            padding: 2rem; border-radius: 8px; width: 100%; max-width: 400px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
        }
        h2 { margin-top: 0; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; font-size: 0.875rem; margin-bottom: 0.5rem; color: var(--muted); }
        input {
            width: 100%; padding: 0.75rem; border: 1px solid var(--border);
            background-color: var(--bg); color: var(--text);
            border-radius: 4px; box-sizing: border-box;
        }
        input:focus { outline: none; border-color: var(--primary); }
        button {
            width: 100%; padding: 0.75rem; border: none; border-radius: 4px;
            background-color: var(--primary); color: white;
            font-weight: 600; cursor: pointer; margin-top: 1rem;
        }
        button:hover { background-color: var(--primary-hover); }
        button:disabled { background-color: var(--border); cursor: not-allowed; }
        .form-switch { text-align: center; margin-top: 1rem; font-size: 0.875rem; }
        .form-switch a { color: var(--primary); text-decoration: none; }
        .form-switch a:hover { text-decoration: underline; }
        #message { margin-top: 1rem; text-align: center; font-size: 0.875rem; }
        .error { color: var(--danger); }
        .success { color: var(--success); }
        
        .webauthn-section {
            margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); text-align: center;
        }
    </style>
</head>
<body>
    <div class="container" id="register-container">
        <h2>Registrazione</h2>
        <form id="register-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Registrati</button>
        </form>
        
        <div id="message"></div>

        <div class="form-switch">
            Hai già un account? <a href="/login">Accedi qui</a>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('register-form');
        const msgDiv = document.getElementById('message');
        const webauthnSection = document.getElementById('webauthn-section');
        const btnWebAuthn = document.getElementById('btn-register-webauthn');

        let registeredUsername = "";

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            msgDiv.textContent = 'Registrazione in corso...';
            msgDiv.className = '';

            try {
                const res = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                if (res.ok) {
                    msgDiv.textContent = 'Registrato! Ora puoi effettuare il login.';
                    msgDiv.className = 'success';
                    setTimeout(() => window.location.href = '/login', 2000);
                } else {
                    const data = await res.json();
                    msgDiv.textContent = 'Errore: ' + (data.error || 'Server error');
                    msgDiv.className = 'error';
                }
            } catch (err) {
                msgDiv.textContent = 'Errore di rete.';
                msgDiv.className = 'error';
            }
        });
    </script>
</body>
</html>
