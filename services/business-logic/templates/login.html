<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZTALeaks</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-body">
    <div class="login-card">
        <div class="login-header">
            <h1>ZTALeaks</h1>
            <p>Accesso Sicuro</p>
        </div>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Inserisci username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Inserisci password" required>
            </div>
            <button type="submit" class="btn btn-primary" onclick="event.preventDefault(); alert('Login function not implemented yet');">Accedi</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/'">Torna alla Home</button>
        </form>
    </div>
</body>
</html>
