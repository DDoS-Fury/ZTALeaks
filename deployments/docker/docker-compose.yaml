version: '3.8'

services:
  firewall:
    build:
      context: ../../
      dockerfile: infra/nftables/Dockerfile
    container_name: ztaleaks_firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYSLOG
      - SYS_ADMIN
    env_file:
      - ../../.env
    environment:
      - ENVOY_PORT=${ENVOY_PORT:-8443}
      # Usato dall'entrypoint per risolvere l'interfaccia front-net
      # (le rule IDS NFQUEUE devono intercettare solo il traffico esterno).
      - FRONT_NET_SUBNET=172.30.0.0/24
    ports:
      - "${ENVOY_PORT:-8443}:${ENVOY_PORT:-8443}"
    volumes:
      - firewall-logs:/var/log/ztaleaks/nftables
    networks:
      front-net:
        aliases:
          - envoy
          - ztaleaks_envoy
      back-net: {}
      auth-net: {}
      snort-net: {}
    restart: unless-stopped

  envoy:
    build:
      context: ../../
      dockerfile: infra/envoy/Dockerfile
    container_name: ztaleaks_envoy
    network_mode: service:firewall
    depends_on:
      - firewall
      - security-orchestrator
      - business-logic
    volumes:
      - envoy-logs:/var/log/ztaleaks/envoy
    restart: unless-stopped

  snort:
    build:
      context: ../../
      dockerfile: infra/snort/Dockerfile
    container_name: ztaleaks_snort
    network_mode: service:firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - firewall
    volumes:
      - snort-logs:/var/log/ztaleaks/snort
    restart: unless-stopped

  snort-internal:
    build:
      context: ../../
      dockerfile: infra/snort-internal/Dockerfile
    container_name: ztaleaks_snort_internal
    network_mode: service:firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - firewall
    env_file:
      - ../../.env
    environment:
      - ENVOY_PORT=${ENVOY_PORT:-8443}
    volumes:
      - snort-internal-logs:/var/log/ztaleaks/snort-internal
    restart: unless-stopped

  snort-mid:
    build:
      context: ../../
      dockerfile: infra/snort-mid/Dockerfile
    container_name: ztaleaks_snort_mid
    network_mode: service:firewall
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - firewall
    volumes:
      - snort-mid-logs:/var/log/ztaleaks/snort-mid
    restart: unless-stopped

  identity-service:
    build:
      context: ../../services/identity-service
      dockerfile: Dockerfile
    container_name: ztaleaks_identity_service
    depends_on:
      security-db:
        condition: service_healthy
      mailhog:
        condition: service_started
    env_file:
      - ../../.env
    # NOTE: porta esposta temporaneamente per test diretti durante lo sviluppo;
    # in produzione le richieste dovrebbero passare solo via Envoy.
    ports:
      - "8082:8082"
    volumes:
      - identity-logs:/var/log/ztaleaks/identity
    restart: unless-stopped
    networks:
      - auth-net

  mailhog:
    image: mailhog/mailhog:latest
    container_name: ztaleaks_mailhog
    ports:
      - "8025:8025"   # Web UI (http://localhost:8025) per ispezione manuale OTP
    restart: unless-stopped
    networks:
      auth-net:
        aliases:
          - mailhog

  security-orchestrator:
    build:
      context: ../../services/security-orchestrator
      dockerfile: Dockerfile
    container_name: ztaleaks_security_orchestrator
    depends_on:
      opa:
        condition: service_started # OPA deve essere in ascolto prima di avviare l'orchestrator
      security-db:
        condition: service_healthy
      identity-service:
        condition: service_started  # JWKS endpoint deve essere up
      ai-inference:
        condition: service_healthy
    env_file:
      - ../../.env
    restart: unless-stopped
    environment:
      - SECURITY_ORCHESTRATOR_PORT=${SECURITY_ORCHESTRATOR_PORT:-8081}
      - SNORT_ALERTS_TCP_PORT=${SNORT_ALERTS_TCP_PORT:-9000}
      - AI_SCORER_URL=http://ai-inference:8088
    volumes:
      - orchestrator-logs:/var/log/ztaleaks/orchestrator
    networks:
      - front-net
      - auth-net
      - snort-net

  opa:
    image: openpolicyagent/opa:latest-envoy
    platform: linux/amd64
    container_name: ztaleaks_opa
    volumes:
      - ../../infra/opa/policy.rego:/policy.rego
      - ../../infra/opa/data.json:/data.json
      - opa-logs:/var/log/ztaleaks/opa
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--log-format=json"
      - "--set=decision_logs.console=true"
      - "--set=services.orchestrator.url=http://security-orchestrator:8081/api/v1/opa"
      - "--set=decision_logs.service=orchestrator"
      - "/policy.rego"
      - "/data.json"
    restart: unless-stopped
    networks:
      auth-net:
        aliases:
          - opa

  business-logic:
    build:
      context: ../../services/business-logic
      dockerfile: Dockerfile
    container_name: ztaleaks_business_logic
    depends_on:
      business-db:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      - BUSINESS_LOGIC_PORT=${BUSINESS_LOGIC_PORT:-8080}
    volumes:
      - business-logs:/var/log/ztaleaks/business-logic
    restart: unless-stopped
    networks:
      - back-net
      - auth-net # Usually needs auth-net so OPA/Orchestrator can reach it, or Envoy routes directly

  business-db:
    build:
      context: ../../infra/databases/business
      dockerfile: Dockerfile
    container_name: ztaleaks_business_db
    volumes:
       - business-db-data:/data/db
       - business-db-logs:/var/log/ztaleaks/mongodb
    restart: unless-stopped
    networks:
      - back-net

  security-db:
    build:
      context: ../../infra/databases/security
      dockerfile: Dockerfile
    container_name: ztaleaks_security_db
    env_file:
      - ../../.env
    volumes:
       - security-db-data:/data/db
       - security-db-logs:/var/log/ztaleaks/security-db
    restart: unless-stopped
    networks:
      - auth-net

  ai-inference:
    build:
      context: ../../infra/ai-inference
      dockerfile: docker/Dockerfile
    container_name: ztaleaks_ai_inference
    image: graphagate
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ../../infra/ai-inference/public:/app/public
      - ../../infra/ai-inference/src:/app/src
    command: ["graphagate.serve_api"]
    ports:
      - "8888:8088"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8088/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - auth-net
    restart: unless-stopped

  seeder:
    build:
      context: ../../tools/seeder
      dockerfile: Dockerfile
    container_name: ztaleaks_seeder
    env_file:
      - ../../.env
    depends_on:
      business-db:
        condition: service_healthy
    restart: "no"
    networks:
      - back-net

  splunk:
    image: splunk/splunk:latest
    container_name: ztaleaks_splunk
    env_file:
      - ../../.env
    environment:
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_START_ARGS=--accept-license --answer-yes
    ports:
      - "8000:8000"
      - "8088:8088"
      - "9997:9997"
    volumes:
      - splunk-etc:/opt/splunk/etc
      - splunk-var:/opt/splunk/var
    restart: unless-stopped
    networks:
      back-net:
        aliases:
          - splunk

  splunk-uf:
    image: splunk/universalforwarder:latest
    container_name: ztaleaks_splunk_uf
    user: root
    env_file:
      - ../../.env
    environment:
      - SPLUNK_GENERAL_TERMS=--accept-sgt-current-at-splunk-com
      - SPLUNK_START_ARGS=--accept-license --answer-yes --run-as-root
      - SPLUNK_USER=root
      - SPLUNK_STANDALONE_URL=splunk
    depends_on:
      - splunk
    volumes:
      - ../../infra/splunk-uf:/opt/splunkforwarder/etc/apps/ztaleaks_forwarder/local
      - firewall-logs:/var/log/ztaleaks/nftables:ro
      - envoy-logs:/var/log/ztaleaks/envoy:ro
      - snort-logs:/var/log/ztaleaks/snort:ro
      - snort-internal-logs:/var/log/ztaleaks/snort-internal:ro
      - snort-mid-logs:/var/log/ztaleaks/snort-mid:ro
      - business-logs:/var/log/ztaleaks/business-logic:ro
      - identity-logs:/var/log/ztaleaks/identity:ro
      - orchestrator-logs:/var/log/ztaleaks/orchestrator:ro
      - opa-logs:/var/log/ztaleaks/opa:ro
      - business-db-logs:/var/log/ztaleaks/mongodb:ro
      - security-db-logs:/var/log/ztaleaks/security-db:ro
    restart: unless-stopped
    networks:
      - back-net

  alerts-tester:
    build:
      context: ../../
      dockerfile: tests/alerts/Dockerfile
    container_name: ztaleaks_alerts_tester
    profiles: ["alerttest"]

networks:
  # Subnet pinnate: l'entrypoint del firewall risolve l'interfaccia
  # front-net per subnet (per le rule IDS NFQUEUE). Le altre sono
  # pinnate per simmetria/leggibilita'.
  front-net:
    ipam:
      config:
        - subnet: 172.30.0.0/24
  auth-net:
    ipam:
      config:
        - subnet: 172.31.0.0/24
  back-net:
    ipam:
      config:
        - subnet: 172.32.0.0/24
  # Rete privata dedicata al trasporto allert Snort -> Security Orchestrator
  # (TCP socket persistente sostituisce il vecchio endpoint HTTP).
  snort-net:
    internal: true
    ipam:
      config:
        - subnet: 172.33.0.0/24

volumes:
  business-db-data:
  business-db-logs:
  security-db-data:
  security-db-logs:
  firewall-logs:
  envoy-logs:
  snort-logs:
  snort-internal-logs:
  snort-mid-logs:
  business-logs:
  identity-logs:
  orchestrator-logs:
  opa-logs:
  splunk-etc:
  splunk-var:
