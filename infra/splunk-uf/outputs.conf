# =============================================================================
# Splunk Universal Forwarder - outputs.conf
#
# Configures the forwarding destination for all monitored log data.
# All events collected by inputs.conf are sent to the Splunk indexer
# running on the "splunk" host at the standard receiving port 9997.
# =============================================================================

[tcpout]
defaultGroup = default-autolb-group

[tcpout:default-autolb-group]
server = splunk:9997

[tcpout-server://splunk:9997]