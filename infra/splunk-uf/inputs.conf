# =============================================================================
# Splunk Universal Forwarder - inputs.conf
#
# Monitors all JSONL log directories produced by the ZTALeaks infrastructure
# components and forwards their contents to the Splunk indexer.
#
# All sources use sourcetype=_json because every component writes structured
# newline-delimited JSON (JSONL).
# =============================================================================

# nftables firewall events (ulogd NFLOG -> Go parser -> JSONL)
[monitor:///var/log/ztaleaks/nftables]
disabled   = false
index      = main
sourcetype = _json

# Snort external (front-net) - port scan and reconnaissance alerts
[monitor:///var/log/ztaleaks/snort]
disabled   = false
index      = main
sourcetype = _json

# Snort internal (Envoy port) - TLS handshake and mTLS anomaly alerts
[monitor:///var/log/ztaleaks/snort-internal]
disabled   = false
index      = main
sourcetype = _json

# Snort mid (ext_authz channel) - SQL injection and XSS alerts
[monitor:///var/log/ztaleaks/snort-mid]
disabled   = false
index      = main
sourcetype = _json

# Envoy access logs (JSON format with JA3, user, risk score)
[monitor:///var/log/ztaleaks/envoy]
disabled   = false
index      = main
sourcetype = _json

# Business logic service application logs
[monitor:///var/log/ztaleaks/business-logic]
disabled   = false
index      = main
sourcetype = _json

# MongoDB audit and diagnostic logs (Business)
[monitor:///var/log/ztaleaks/mongodb]
disabled   = false
index      = main
sourcetype = _json

# Security Database logs
[monitor:///var/log/ztaleaks/security-db]
disabled   = false
index      = main
sourcetype = _json

# Identity service logs (login, MFA, WebAuthn events)
[monitor:///var/log/ztaleaks/identity]
disabled   = false
index      = main
sourcetype = _json

# Security Orchestrator logs (authorization decisions, AI scores, TPM checks)
[monitor:///var/log/ztaleaks/orchestrator]
disabled   = false
index      = main
sourcetype = _json

# OPA policy evaluation logs
[monitor:///var/log/ztaleaks/opa]
disabled   = false
index      = main
sourcetype = _json