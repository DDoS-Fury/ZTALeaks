apiVersion: v1
kind: Service
metadata:
  name: security-db
  labels:
    app: security-db
spec:
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: security-db
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: security-db
  labels:
    app: security-db
spec:
  serviceName: "security-db"
  replicas: 1
  selector:
    matchLabels:
      app: security-db
  template:
    metadata:
      labels:
        app: security-db
    spec:
      containers:
      - name: security-db
        image: mongo:6.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 27017
          name: mongodb
        envFrom:
        - secretRef:
            name: ztaleaks-secrets
        volumeMounts:
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d/
      volumes:
      - name: init-scripts
        configMap:
          name: security-db-init
