<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZTALeaks</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0e17; --bg-sidebar: #0d1220; --bg-card: #111827; 
            --bg-input: #1a2332; --border: #1e293b; --text: #e2e8f0; 
            --text-muted: #94a3b8; --accent: #f59e0b; --accent-hover: #d97706; 
            --danger: #ef4444; --success: #22c55e; --info: #3b82f6;
        }
        body {
            font-family: 'Courier New', Courier, monospace; background: var(--bg-dark);
            color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--bg-card); padding: 40px; border-radius: 8px;
            border: 1px solid var(--border); width: 100%; max-width: 400px;
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h1 { color: var(--accent); font-size: 1.8rem; letter-spacing: 2px; }
        .login-header p { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
        .form-group label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }
        .form-group input {
            background: var(--bg-input); border: 1px solid var(--border);
            border-radius: 4px; padding: 0.75rem; color: var(--text); font-family: inherit;
        }
        .form-group input:focus { outline: none; border-color: var(--accent); }
        
        .btn { padding: 0.75rem; border: none; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: background 0.2s; width: 100%; font-weight: bold; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); margin-top: 1rem; }
        .btn-secondary:hover { background: var(--border); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <h1>ZTALeaks</h1>
            <p>Accesso Sicuro</p>
        </div>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Inserisci username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Inserisci password" required>
            </div>
            <!-- Modificato per inviare le credenziali all'identity-service via fetch() tramite l'Envoy -->
            <button type="submit" class="btn btn-primary" onclick="handleLogin(event)">Accedi</button>
            <button type="button" class="btn btn-secondary" onclick="window.location.href='/'">Torna alla Home</button>
        </form>
    </div>

    <script>
        async function handleLogin(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');

            try {
                // Invia la richiesta al nuovo route gestito da Envoy e mandato su identity-service
                const res = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: usernameInput.value,
                        password: passwordInput.value
                    })
                });

                if (res.ok) {
                    // Autenticazione riuscita (il token è anche impostato nel cookie HttpOnly di identity-service)
                    window.location.href = '/reserved';
                } else {
                    // Errore: credenziali o errore interno
                    alert('Credenziali non valide o errore di autenticazione ');
                    passwordInput.value = '';
                }
            } catch (err) {
                console.error(err);
                alert('Errore di rete durante il login.');
            }
        }
    </script>
</body>
</html>
